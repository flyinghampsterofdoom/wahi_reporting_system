<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Par and Levels | Bar Inventory</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="layout">
      <header class="line">
        <div>
          <h1>Par and Levels</h1>
          <p>Toggle between FOH and BOH to edit one area at a time.</p>
        </div>
        <a class="button-link" href="/">Back to Home</a>
      </header>

      <section class="card">
        <div class="line">
          <button id="par-area-foh" class="secondary">FOH</button>
          <button id="par-area-boh" class="secondary">BOH</button>
        </div>
      </section>

      <section class="card">
        <h2 id="par-levels-title">FOH Par and Levels</h2>
        <div id="par-levels-table"></div>
      </section>

      <section class="card line">
        <button id="save-par-levels">Save Par and Levels</button>
      </section>

      <div id="toast" class="toast"></div>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
