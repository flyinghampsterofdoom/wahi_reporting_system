<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Recipe Builder | Bar Inventory</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="layout">
      <header class="line">
        <div>
          <h1>Recipe Builder</h1>
          <p>Build recipes line-by-line with ingredients, directions, temperature, time, and nested recipes.</p>
        </div>
        <a class="button-link" href="/">Back to Home</a>
      </header>

      <section class="grid two" id="recipe-builder-grid">
        <article class="card">
          <div class="line">
            <h2>Recipes</h2>
            <a class="button-link mini-btn" href="/recipe-create">Create Recipe</a>
          </div>
          <div id="recipe-list"></div>
        </article>

        <article class="card" id="recipe-editor-card" hidden>
          <div class="line">
            <h2 id="editor-title">Recipe Editor</h2>
            <a id="back-to-recipe-list" class="button-link mini-btn" href="/recipe-builder">All Recipes</a>
            <button id="switch-to-edit" class="mini-btn" style="display: none">Edit Recipe</button>
            <button id="save-recipe-meta" class="secondary mini-btn">Save Header</button>
            <button id="save-recipe-lines" class="mini-btn">Save Lines</button>
          </div>

          <div class="stack">
            <input type="hidden" id="editor-recipe-id" />
            <label>
              Name
              <input type="text" id="editor-recipe-name" required />
            </label>
            <label>
              Category
              <input type="text" id="editor-recipe-category" />
            </label>
            <label>
              Status
              <select id="editor-recipe-status">
                <option value="Draft">Draft</option>
                <option value="Active">Active</option>
                <option value="Archived">Archived</option>
              </select>
            </label>
            <div class="line">
              <label>
                Yield Qty
                <input type="number" id="editor-recipe-yield-qty" min="0" step="0.01" />
              </label>
              <label>
                Yield Unit
                <input type="text" id="editor-recipe-yield-unit" />
              </label>
            </div>
            <label>
              Notes
              <textarea id="editor-recipe-notes" rows="3"></textarea>
            </label>
            <p><strong>Total Cost:</strong> <span id="editor-total-cost">$0.00</span></p>
          </div>

          <hr />
          <div class="line">
            <button id="add-recipe-line" class="secondary mini-btn">Add Line</button>
          </div>
          <div id="recipe-lines" class="stack"></div>
        </article>
      </section>

      <div id="toast" class="toast"></div>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
