<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Inventory Count | Bar Inventory</title>
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <main class="layout">
      <header class="line">
        <div>
          <h1>Inventory Count</h1>
          <p>Choose FOH or BOH. Tracked sizes appear first; untracked sizes are listed below with 0 defaults.</p>
        </div>
        <a class="button-link" href="/">Back to Home</a>
      </header>

      <section class="card">
        <div class="line">
          <button id="counts-area-foh" class="secondary">FOH</button>
          <button id="counts-area-boh" class="secondary">BOH</button>
        </div>
      </section>

      <section class="card">
        <div class="line">
          <label>
            Count Date
            <input type="date" id="count-date" />
          </label>
          <button id="load-count-sheet" class="secondary">Load Count Sheet</button>
          <button id="save-counts">Save Counts</button>
        </div>
        <div id="count-sheet"></div>
      </section>

      <div id="toast" class="toast"></div>
    </main>

    <script src="/app.js"></script>
  </body>
</html>
